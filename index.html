<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弱水</title>
  <meta name="description" content="弱水 — 散文与随笔" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Source+Serif+4:opsz,wght@8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap"

    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    crossorigin="anonymous"
  />

  <link rel="stylesheet" href="assets/css/style.css?v=8" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#/" class="site-title" aria-label="返回首页">弱水</a>
      <nav class="site-nav">
        <button id="theme-toggle" type="button" aria-label="切换明暗主题" title="切换主题">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <!-- ===== List view ===== -->
    <section id="view-list" class="view container">
      <div class="hero">
        <h1 class="hero-title">弱水</h1>
        <p class="hero-tagline">昆仑之北有水，其力不能胜芥，故名弱水。鸿毛不浮，不可越也。</p>
      </div>

      <div class="tag-filter" id="tag-filter" role="toolbar" aria-label="标签筛选"></div>

      <ul class="post-list" id="post-list"></ul>

      <p id="list-status" class="list-status" hidden></p>
    </section>

    <!-- ===== Post view ===== -->
    <article id="view-post" class="view post-view container" hidden>
      <a href="#/" class="back-link" aria-label="返回文章列表">← 返回</a>
      <header class="post-header">
        <h1 id="post-title"></h1>
        <div class="post-meta">
          <time id="post-date"></time>
          <span id="post-tags" class="post-tags-inline"></span>
        </div>
      </header>
      <div id="post-content" class="prose"></div>
      <div class="post-footer">
        <a href="#/" class="back-link">← 返回文章列表</a>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="footer-year"></span> 弱水</p>
    </div>
  </footer>

  <!-- Markdown renderer + math -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="assets/js/widgets/projective-attention.js?v=1"></script>

  <!-- React + Babel for JSX widgets (e.g. philosophers-timeline) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="assets/js/widgets/east-west.jsx?v=1"></script>

  <script src="assets/js/app.js?v=9"></script>
</body>
</html>
